services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fastapi-refresh-server
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    volumes:
      - ./server:/app
    depends_on:
      postgres:
        condition: service_healthy
  
  postgres:
    image: postgis/postgis:17-3.4
    container_name: fastapi-refresh-postgis
    env_file: .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  pgadmin:
    image: dpage/pgadmin4
    container_name: fastapi-refresh-pgadmin
    env_file: .env
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin-data: